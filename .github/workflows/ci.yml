name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # node-snap7 (a native devDependency of the gateway) compiles via
      # node-gyp; ubuntu-latest ships build-essential + python3 so `npm ci`
      # builds it without extra setup.
      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test
