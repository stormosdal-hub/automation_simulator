<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Automation Sim — Phase 1 Spike</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0e1116;
        color: #dfe6ee;
        font-family: ui-monospace, 'Cascadia Mono', Consolas, monospace;
      }
      #renderCanvas {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
        touch-action: none;
      }
      #topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 40px;
        background: rgba(10, 14, 20, 0.94);
        border-bottom: 1px solid #2a3442;
        display: flex;
        align-items: center;
        padding: 0 10px;
        gap: 8px;
        z-index: 100;
      }
      #topbar .brand {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #5c6b7d;
        margin-right: 4px;
      }
      .file-menu {
        position: relative;
      }
      .file-menu-dropdown {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        min-width: 190px;
        background: #131a24;
        border: 1px solid #2a3442;
        border-radius: 6px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        padding: 4px;
        display: flex;
        flex-direction: column;
        z-index: 101;
      }
      .file-menu-dropdown[hidden] {
        display: none;
      }
      .file-menu-item {
        background: none;
        border: none;
        color: #dfe6ee;
        text-align: left;
        padding: 7px 10px;
        font: inherit;
        font-size: 12px;
        border-radius: 4px;
        cursor: pointer;
      }
      .file-menu-item:hover {
        background: #1d2a3a;
      }
      .online-menu {
        position: relative;
      }
      .online-menu-dropdown {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        width: 320px;
        max-height: calc(100vh - 90px);
        overflow-y: auto;
        background: #131a24;
        border: 1px solid #2a3442;
        border-radius: 6px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 7px;
        z-index: 101;
      }
      .online-menu-dropdown[hidden] {
        display: none;
      }
      .online-section-title {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #5c6b7d;
        border-bottom: 1px solid #2a3442;
        padding-bottom: 3px;
        margin-top: 2px;
      }
      .online-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .online-empty {
        font-size: 11.5px;
        padding: 2px 0;
      }
      .online-conn-row {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 4px 0;
      }
      .online-conn-label {
        flex: 1;
        min-width: 0;
        font-size: 11.5px;
        line-height: 1.4;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .online-conn-actions {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
      }
      .online-field {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .online-search-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .online-search-row .online-port {
        width: 68px;
        flex: 0 0 auto;
      }
      .online-search-row .btn {
        flex: 1;
      }
      .online-scan-results {
        display: flex;
        flex-direction: column;
        gap: 3px;
        font-size: 11.5px;
        max-height: 160px;
        overflow-y: auto;
      }
      .online-scan-results:empty {
        display: none;
      }
      .online-scan-hit {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 2px 0;
      }
      .online-scan-label {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .online-field label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #5c6b7d;
      }
      .online-actions {
        display: flex;
        gap: 6px;
      }
      .online-actions .btn {
        flex: 1;
      }
      .online-result {
        font-size: 11.5px;
        color: #8fa3b8;
        min-height: 1.4em;
      }
      .panels-menu {
        position: relative;
      }
      .panels-menu-dropdown {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        width: 250px;
        max-height: calc(100vh - 90px);
        overflow-y: auto;
        background: #131a24;
        border: 1px solid #2a3442;
        border-radius: 6px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        z-index: 101;
      }
      .panels-menu-dropdown[hidden] {
        display: none;
      }
      .panels-section-title {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #5c6b7d;
        border-bottom: 1px solid #2a3442;
        padding-bottom: 3px;
        margin-top: 6px;
      }
      .panels-section-title:first-child {
        margin-top: 0;
      }
      .panels-preset-row {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .panels-preset-row .btn {
        flex: 1;
      }
      .panels-preset-row .btn.preset-active {
        background: #24344a;
        border-color: #3d8bff;
        color: #9cc4ff;
      }
      .panels-toggle-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 2px;
        font-size: 12px;
        cursor: pointer;
        border-radius: 4px;
      }
      .panels-toggle-row:hover {
        background: #1d2a3a;
      }
      .panels-toggle-row input[type='checkbox'] {
        width: auto;
        margin: 0;
        cursor: pointer;
        accent-color: #3d8bff;
      }
      .panels-toggle-row input:disabled {
        cursor: default;
      }
      /* brief highlight when the command palette jumps to a panel */
      @keyframes panel-flash-kf {
        0% { box-shadow: 0 0 0 2px #3d8bff, 0 0 18px rgba(61, 139, 255, 0.5); }
        100% { box-shadow: 0 0 0 0 rgba(61, 139, 255, 0); }
      }
      .panel-flash {
        animation: panel-flash-kf 1.2s ease-out;
      }
      tr.tag-flash td {
        background: rgba(61, 139, 255, 0.18);
        transition: background 1s ease-out;
      }
      .command-overlay {
        position: fixed;
        inset: 0;
        background: rgba(6, 9, 13, 0.55);
        z-index: 200;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 12vh;
      }
      .command-overlay[hidden] {
        display: none;
      }
      .command-box {
        width: min(560px, 92vw);
        background: #131a24;
        border: 1px solid #33465c;
        border-radius: 10px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.6);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        max-height: 66vh;
      }
      .command-input {
        border: none;
        border-bottom: 1px solid #2a3442;
        background: transparent;
        color: #dfe6ee;
        font: inherit;
        font-size: 15px;
        padding: 14px 16px;
        width: 100%;
        box-sizing: border-box;
        border-radius: 0;
      }
      .command-input:focus {
        outline: none;
      }
      .command-list {
        overflow-y: auto;
        padding: 6px;
        scrollbar-width: thin;
      }
      .command-cat {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #5c6b7d;
        padding: 8px 8px 3px;
      }
      .command-item {
        padding: 7px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .command-item.active {
        background: #24344a;
        color: #9cc4ff;
      }
      .command-empty {
        padding: 16px;
        text-align: center;
        font-size: 13px;
      }
      .machine-ctx-menu {
        position: fixed;
        z-index: 150;
        background: #131a24;
        border: 1px solid #33465c;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        padding: 4px;
        display: flex;
        flex-direction: column;
        min-width: 140px;
      }
      .machine-ctx-menu[hidden] {
        display: none;
      }
      .machine-ctx-item {
        background: none;
        border: none;
        color: #dfe6ee;
        text-align: left;
        padding: 7px 10px;
        font: inherit;
        font-size: 12.5px;
        border-radius: 5px;
        cursor: pointer;
      }
      .machine-ctx-item:hover {
        background: #1d2a3a;
      }
      .machine-ctx-item[data-role='machine-ctx-remove'] {
        color: #ff8f8f;
      }
      #hud {
        position: fixed;
        top: 52px;
        left: 12px;
        background: rgba(10, 14, 20, 0.78);
        border: 1px solid #2a3442;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 12px;
        line-height: 1.55;
        min-width: 240px;
        pointer-events: none;
      }
      #hud h1 {
        font-size: 12px;
        margin: 0 0 6px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #8fa3b8;
      }
      .ok {
        color: #5dd39e;
      }
      .bad {
        color: #ff7a7a;
      }
      .dim {
        color: #5c6b7d;
      }
      #panels {
        position: fixed;
        top: 52px;
        right: 12px;
        width: 340px;
        max-height: calc(100vh - 64px);
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow-y: auto;
        overflow-x: hidden;
        padding-bottom: 4px;
        scrollbar-width: thin;
      }
      /* thin vertical bars that drag a whole column wider/narrower */
      .col-resize-handle {
        position: fixed;
        width: 7px;
        cursor: ew-resize;
        z-index: 50;
        border-radius: 4px;
      }
      .col-resize-handle::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 3px;
        height: 34px;
        border-radius: 3px;
        background: #2a3442;
        transition: background 0.12s;
      }
      .col-resize-handle:hover::after,
      .col-resize-handle.dragging::after {
        background: #3d8bff;
      }
      .panel {
        background: rgba(10, 14, 20, 0.82);
        border: 1px solid #2a3442;
        border-radius: 8px;
        font-size: 12px;
        overflow: hidden;
      }
      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        cursor: pointer;
        user-select: none;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #8fa3b8;
        font-size: 11px;
      }
      .panel-header:hover {
        color: #dfe6ee;
      }
      .panel.collapsed .panel-body {
        display: none;
      }
      .panel-body {
        padding: 2px 12px 10px;
        max-height: 70vh;
        min-height: 34px;
        overflow: auto;
        /* native corner grip: drag to make a panel taller/shorter; content scrolls inside */
        resize: vertical;
      }
      .panel.collapsed .panel-body {
        resize: none;
      }
      #tag-table {
        width: 100%;
        border-collapse: collapse;
      }
      #tag-table th {
        text-align: left;
        color: #5c6b7d;
        font-weight: 500;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 4px 8px 4px 0;
        border-bottom: 1px solid #2a3442;
      }
      #tag-table td {
        padding: 5px 8px 5px 0;
        border-bottom: 1px solid rgba(42, 52, 66, 0.4);
      }
      #tag-table td.v {
        font-weight: 600;
      }
      #tag-table .stale {
        color: #ff7a7a;
      }
      .bool-true {
        color: #5dd39e;
      }
      .bool-false {
        color: #8b95a3;
      }
      #panels-left {
        position: fixed;
        top: 116px;
        left: 12px;
        width: 300px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: calc(100vh - 132px);
        overflow-y: auto;
        overflow-x: hidden;
        padding-bottom: 4px;
        scrollbar-width: thin;
      }
      .tree-row {
        padding: 3px 6px;
        cursor: pointer;
        border-radius: 4px;
        white-space: nowrap;
      }
      .tree-row:hover {
        background: #17202c;
      }
      .tree-row.selected {
        background: #1d2a3a;
        color: #9cc4ff;
      }
      .binding-row {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 5px 0;
        border-bottom: 1px solid rgba(42, 52, 66, 0.4);
      }
      .binding-desc {
        flex: 1;
        line-height: 1.4;
      }
      .warn {
        color: #eec83a;
      }
      .icon-btn {
        background: none;
        border: none;
        color: #8fa3b8;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        padding: 2px 5px;
      }
      .icon-btn:hover {
        color: #dfe6ee;
      }
      .icon-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .btn {
        background: #1d2a3a;
        border: 1px solid #2f4258;
        color: #cfe0f4;
        border-radius: 5px;
        padding: 5px 10px;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
      }
      .btn:hover {
        background: #24344a;
      }
      .btn-small {
        padding: 3px 8px;
        font-size: 11px;
      }
      .btn-row {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }
      .project-row {
        border-top: 1px solid #2a3442;
        padding-top: 8px;
      }
      .binding-form {
        border-top: 1px solid #2a3442;
        margin-top: 8px;
        padding-top: 4px;
      }
      .form-row {
        display: flex;
        flex-direction: column;
        gap: 3px;
        margin: 6px 0;
      }
      .form-row label {
        color: #5c6b7d;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .form-grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 8px;
      }
      .inline-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .inline-row select {
        flex: 1;
      }
      .stop-row {
        display: flex;
        gap: 4px;
        align-items: center;
        margin: 3px 0;
      }
      select,
      input[type='number'],
      input[type='text'] {
        background: #131a24;
        border: 1px solid #2a3442;
        color: #dfe6ee;
        border-radius: 4px;
        padding: 4px 6px;
        font: inherit;
        font-size: 12px;
        width: 100%;
        box-sizing: border-box;
      }
      input[type='color'] {
        background: #131a24;
        border: 1px solid #2a3442;
        border-radius: 4px;
        padding: 1px;
        width: 100%;
        height: 26px;
        box-sizing: border-box;
        cursor: pointer;
      }
      .panel-actions {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      #control-panels {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      #control-panels:not(:empty) {
        margin-top: 0;
      }
      .widget-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        padding-top: 4px;
      }
      .widget {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        padding: 8px 6px;
        background: #111820;
        border: 1px solid #232e3d;
        border-radius: 6px;
      }
      .widget-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #8fa3b8;
      }
      .widget-value {
        font-size: 12px;
        font-weight: 600;
      }
      .widget-delete {
        position: absolute;
        top: 0;
        right: 0;
      }
      .led {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid #232e3d;
        transition: background 0.15s;
      }
      .switch {
        width: 42px;
        height: 22px;
        border-radius: 11px;
        background: #2a3442;
        position: relative;
        cursor: pointer;
        transition: background 0.15s;
      }
      .switch-thumb {
        position: absolute;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #8fa3b8;
        top: 3px;
        left: 3px;
        transition: left 0.12s, background 0.12s;
      }
      .switch.on {
        background: #1f5c3a;
      }
      .switch.on .switch-thumb {
        left: 23px;
        background: #5dd39e;
      }
      .push-btn {
        border-radius: 50%;
        width: 34px;
        height: 34px;
        font-size: 14px;
        color: #ff9d5c;
        border-color: #4a3a2a;
      }
      .push-btn:active {
        background: #4a2f18;
        transform: translateY(1px);
      }
      svg.knob {
        width: 56px;
        height: 56px;
        cursor: ns-resize;
        touch-action: none;
      }
      svg.gauge {
        width: 100px;
        height: 71px;
      }
      .dial-track {
        fill: none;
        stroke: #2a3442;
        stroke-width: 7;
        stroke-linecap: round;
      }
      .dial-fill {
        fill: none;
        stroke: #3d8bff;
        stroke-width: 7;
        stroke-linecap: round;
      }
      .dial-needle {
        stroke: #dfe6ee;
        stroke-width: 2;
        stroke-linecap: round;
      }
      .dial-label {
        fill: #5c6b7d;
        font-size: 9px;
        font-family: inherit;
      }
      .panel-editor {
        border-top: 1px solid #2a3442;
        margin-top: 8px;
        padding-top: 4px;
      }
      .widget.stale {
        opacity: 0.45;
        filter: grayscale(0.5);
      }
      .conn-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 0;
        border-bottom: 1px solid rgba(42, 52, 66, 0.4);
      }
      .conn-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .conn-dot.up {
        background: #5dd39e;
        box-shadow: 0 0 6px rgba(93, 211, 158, 0.5);
      }
      .conn-dot.down {
        background: #ff5c5c;
        box-shadow: 0 0 6px rgba(255, 92, 92, 0.5);
      }
      .conn-label {
        flex: 1;
        line-height: 1.35;
      }
      .conn-label .dim {
        display: block;
        font-size: 10px;
      }
      .conn-device.up {
        color: #5dd39e;
        font-size: 10px;
      }
      .conn-device.down {
        color: #ff5c5c;
        font-size: 10px;
      }
      .alarm-row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 6px 0;
        border-bottom: 1px solid rgba(42, 52, 66, 0.4);
      }
      .alarm-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        margin-top: 4px;
        flex-shrink: 0;
        animation: alarm-pulse 1.2s ease-in-out infinite;
      }
      .alarm-row.warning .alarm-dot {
        background: #eec83a;
      }
      .alarm-row.critical .alarm-dot {
        background: #ff5c5c;
      }
      .alarm-row.critical b {
        color: #ff8a8a;
      }
      .alarm-row.warning b {
        color: #eec83a;
      }
      .alarm-text {
        display: flex;
        flex-direction: column;
        line-height: 1.4;
      }
      @keyframes alarm-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
      .panel.has-alarms .panel-header {
        color: #eec83a;
      }
      .alarm-rule-row {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 0;
      }
      .rules-header {
        margin-top: 10px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        border-bottom: 1px solid #2a3442;
        padding-bottom: 3px;
      }
      .replay-status {
        padding: 4px 0 6px;
        font-size: 12px;
      }
      .replay-status.rec {
        color: #ff5c5c;
      }
      .replay-status.replaying {
        color: #9cc4ff;
      }
      .trend-controls {
        display: flex;
        gap: 6px;
        align-items: center;
        padding: 2px 0 8px;
      }
      .trend-controls select {
        flex: 1;
        min-width: 0;
      }
      .trend-windows {
        display: flex;
        gap: 3px;
      }
      .trend-win-btn {
        background: #131a24;
        border: 1px solid #2a3442;
        color: #8fa3b8;
        border-radius: 4px;
        padding: 3px 7px;
        cursor: pointer;
        font: inherit;
        font-size: 11px;
      }
      .trend-win-btn:hover {
        color: #dfe6ee;
